<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triply - Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2f7fc7; --navy: #11314a; --teal: #57c0d8; --green: #3aa08a;
  --orange: #ef8f4c; --bg: #fbfafa; --border: #eef3f6; --text: #708496;
  --dark: #1a2d3d; --white: #fff; --red: #e05c5c;
}
html, body { height: 100%; background: #e8eef3; font-family: 'Mulish', sans-serif; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
.container { display: flex; min-height: 100vh; justify-content: center; align-items: center; padding: 20px; }
.screen { display: none; width: 100%; max-width: 400px; }
.screen.active { display: block; }
.card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
.title { font-family: 'Baloo 2'; font-size: 28px; font-weight: 800; color: var(--navy); margin-bottom: 20px; }
.subtitle { font-size: 14px; color: var(--text); margin-bottom: 20px; }
input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 12px; font-size: 14px; }
input:focus { outline: none; border-color: var(--blue); }
.btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; }
.btn-primary { background: linear-gradient(135deg, var(--blue), var(--teal)); color: white; }
.btn-primary:active { opacity: 0.8; }
.error { color: var(--red); font-size: 12px; margin-bottom: 12px; }
.success { color: var(--green); font-size: 12px; margin-bottom: 12px; }
.divider { text-align: center; color: var(--text); margin: 15px 0; font-size: 12px; }
.link { color: var(--blue); cursor: pointer; text-decoration: underline; }
.loading { text-align: center; padding: 20px; }
.spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <!-- Auth Screen -->
  <div id="auth-screen" class="screen active">
    <div class="card">
      <div class="title">Triply</div>
      <div class="subtitle">Plan je reis samen met vrienden</div>
      <div id="auth-message"></div>
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Wachtwoord" autocomplete="current-password">
      <button id="btn-submit" class="btn btn-primary" onclick="handleAuth()">Inloggen</button>
      <div class="divider">of</div>
      <button id="btn-toggle" class="btn" onclick="toggleSignup()" style="background:var(--border);color:var(--text);width:100%;padding:14px;border-radius:10px;font-weight:700;font-size:15px;">Nieuw account</button>
    </div>
  </div>

  <!-- Trip Selector Screen -->
  <div id="trip-screen" class="screen">
    <div class="card">
      <div class="title">Mijn reizen</div>
      <div id="trips-list"></div>
      <button class="btn btn-primary" onclick="showCreateTrip()">+ Nieuwe reis</button>
      <button class="btn btn-primary" onclick="handleLogout()" style="background:var(--border);color:var(--red);margin-top:10px;">Logout</button>
    </div>
  </div>

  <!-- Create Trip Screen -->
  <div id="create-trip-screen" class="screen">
    <div class="card">
      <div class="title">Nieuwe reis</div>
      <input type="text" id="trip-name" placeholder="Naam (bijv. Vakantie 2026)">
      <input type="text" id="trip-destination" placeholder="Bestemming (bijv. Rhodos)">
      <input type="date" id="trip-start">
      <input type="date" id="trip-end">
      <input type="text" id="trip-hotel" placeholder="Hotel naam">
      <button class="btn btn-primary" onclick="createTrip()">Reis aanmaken</button>
      <button class="btn btn-primary" onclick="showTripSelector()" style="background:var(--border);color:var(--text);margin-top:10px;">Terug</button>
    </div>
  </div>

  <!-- Planner Screen -->
  <div id="planner-screen" class="screen">
    <div style="padding: 20px;">
      <div class="title" id="trip-title" style="margin-bottom:10px;">Trip</div>
      <div id="planner-content"></div>
    </div>
  </div>

</div>

<script>
// Use _sb to avoid conflict with window.supabase from CDN
var _sb = null;
var currentUser = null;
var currentTrip = null;
var isSignup = false;

async function initSupabase() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    if (!cfg.supabaseUrl || !cfg.supabaseKey) throw new Error('Config missing');
    _sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
    await checkAuth();
  } catch(e) {
    console.error('Supabase init failed:', e);
    showMessage('Fout bij laden: stel SUPABASE_URL en SUPABASE_ANON_KEY in als Vercel env vars', 'error');
  }
}

async function checkAuth() {
  if (!_sb) return;
  const { data: { session } } = await _sb.auth.getSession();
  currentUser = session?.user || null;
  if (currentUser) showTripSelector();
  else showAuthScreen();
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value.trim();
  if (!email || !password) { showMessage('Voer email en wachtwoord in', 'error'); return; }

  const fn = isSignup ? 'signUp' : 'signInWithPassword';
  const { data, error } = await _sb.auth[fn]({ email, password });
  if (error) { showMessage(error.message, 'error'); return; }

  currentUser = data.user;
  if (isSignup && currentUser) {
    await _sb.from('triply_users').upsert([{ id: currentUser.id, email }], { onConflict: 'id' });
  }
  showMessage('Welkom! 🎉', 'success');
  setTimeout(() => showTripSelector(), 800);
}

async function handleLogout() {
  await _sb.auth.signOut();
  currentUser = null;
  currentTrip = null;
  showAuthScreen();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showAuthScreen() {
  isSignup = false;
  showScreen('auth-screen');
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
  document.getElementById('auth-message').innerHTML = '';
  document.getElementById('btn-toggle').textContent = 'Nieuw account';
  document.getElementById('btn-submit').textContent = 'Inloggen';
}

function toggleSignup() {
  isSignup = !isSignup;
  document.getElementById('btn-toggle').textContent = isSignup ? 'Al een account? Inloggen' : 'Nieuw account';
  document.getElementById('btn-submit').textContent = isSignup ? 'Account aanmaken' : 'Inloggen';
}

function showTripSelector() {
  showScreen('trip-screen');
  loadTrips();
}

function showCreateTrip() { showScreen('create-trip-screen'); }

async function createTrip() {
  const name = document.getElementById('trip-name').value.trim();
  const destination = document.getElementById('trip-destination').value.trim();
  const start = document.getElementById('trip-start').value;
  const end = document.getElementById('trip-end').value;
  const hotel = document.getElementById('trip-hotel').value.trim();

  if (!name || !destination || !start || !end) { showMessage('Vul alle velden in', 'error'); return; }

  const { error } = await _sb.from('triply_trips').insert([{
    owner_id: currentUser.id, name, destination,
    start_date: start, end_date: end, hotel_name: hotel,
    location_lat: 0, location_lng: 0, hotel_lat: 0, hotel_lng: 0,
  }]);

  if (error) { showMessage(error.message, 'error'); return; }
  showMessage('Reis aangemaakt! ✈️', 'success');
  setTimeout(() => showTripSelector(), 800);
}

async function loadTrips() {
  document.getElementById('trips-list').innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner"></div></div>';
  const { data, error } = await _sb.from('triply_trips')
    .select('*').eq('owner_id', currentUser.id).order('created_at', { ascending: false });

  if (error) { document.getElementById('trips-list').innerHTML = `<div class="error">${error.message}</div>`; return; }

  document.getElementById('trips-list').innerHTML = (data || []).map(t => `
    <div style="padding:14px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:border-color .2s"
         onmouseenter="this.style.borderColor='var(--blue)'" onmouseleave="this.style.borderColor='var(--border)'"
         onclick="selectTrip('${t.id}')">
      <div style="font-weight:700;color:var(--navy);margin-bottom:3px">${t.name}</div>
      <div style="font-size:12px;color:var(--text)">${t.destination} &nbsp;•&nbsp; ${t.start_date} t/m ${t.end_date}</div>
    </div>
  `).join('') || '<div style="color:var(--text);text-align:center;padding:24px">Nog geen reizen. Maak er een aan! 👇</div>';
}

async function selectTrip(tripId) {
  const { data, error } = await _sb.from('triply_trips').select('*').eq('id', tripId).single();
  if (error) { showMessage(error.message, 'error'); return; }
  currentTrip = data;
  document.getElementById('trip-title').textContent = `${data.name} — ${data.destination}`;
  document.getElementById('planner-content').innerHTML = `
    <p style="color:var(--text);margin-bottom:16px">${data.start_date} t/m ${data.end_date} · ${data.hotel_name || ''}</p>
    <div id="group-section"></div>
  `;
  showScreen('planner-screen');
  loadGroups(tripId);
}

async function loadGroups(tripId) {
  const { data } = await _sb.from('triply_groups').select('*').eq('trip_id', tripId);
  const el = document.getElementById('group-section');
  if (!el) return;
  el.innerHTML = `
    <div style="font-weight:700;color:var(--navy);margin-bottom:10px">Groepen</div>
    ${(data || []).map(g => `
      <div style="padding:12px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;color:var(--navy)">${g.name}</div>
          <div style="font-size:11px;color:var(--text)">Code: <b>${g.share_code}</b></div>
        </div>
        <button onclick="copyCode('${g.share_code}')" style="background:var(--border);padding:6px 10px;border-radius:8px;font-size:12px;font-weight:700">Kopieer code</button>
      </div>
    `).join('')}
    <button onclick="createGroup('${tripId}')" class="btn btn-primary" style="margin-top:8px">+ Groep aanmaken</button>
    <button onclick="joinGroupPrompt()" class="btn btn-primary" style="background:var(--border);color:var(--navy);margin-top:8px">Joinen met code</button>
    <button onclick="showTripSelector()" class="btn btn-primary" style="background:var(--border);color:var(--text);margin-top:8px">← Terug</button>
  `;
}

async function createGroup(tripId) {
  const name = prompt('Naam voor de groep (bijv. "Familie" of "Vrienden"):');
  if (!name) return;
  const code = Math.random().toString(36).substring(2, 8).toUpperCase();
  const { error } = await _sb.from('triply_groups').insert([{
    trip_id: tripId, name, share_code: code, created_by: currentUser.id
  }]);
  if (error) { showMessage(error.message, 'error'); return; }
  showMessage(`Groep aangemaakt! Code: ${code}`, 'success');
  loadGroups(tripId);
}

async function joinGroupPrompt() {
  const code = prompt('Voer de 6-cijferige groepscode in:');
  if (!code) return;
  const { data: group, error } = await _sb.from('triply_groups').select('*').eq('share_code', code.toUpperCase()).maybeSingle();
  if (error || !group) { showMessage('Code niet gevonden', 'error'); return; }
  const { error: e2 } = await _sb.from('triply_group_members').insert([{ group_id: group.id, user_id: currentUser.id }]);
  if (e2 && e2.code !== '23505') { showMessage(e2.message, 'error'); return; }
  showMessage(`Welkom bij ${group.name}! 🎉`, 'success');
  selectTrip(group.trip_id);
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showMessage(`Code ${code} gekopieerd!`, 'success'));
}

function showMessage(msg, type) {
  const el = document.getElementById('auth-message');
  if (el) { el.innerHTML = `<div class="${type}" style="text-align:center">${msg}</div>`; setTimeout(() => el.innerHTML = '', 3000); }
  else { alert(msg); }
}

initSupabase();
</script>
</body>
</html>
