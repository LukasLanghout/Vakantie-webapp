<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triply - Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #2f7fc7; --navy: #11314a; --teal: #57c0d8; --green: #3aa08a;
  --orange: #ef8f4c; --bg: #fbfafa; --border: #eef3f6; --text: #708496;
  --dark: #1a2d3d; --white: #fff; --red: #e05c5c;
}
html, body { height: 100%; background: #e8eef3; font-family: 'Mulish', sans-serif; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
.container { display: flex; min-height: 100vh; justify-content: center; align-items: center; padding: 20px; }
.screen { display: none; width: 100%; max-width: 400px; }
.screen.active { display: block; }
.card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
.title { font-family: 'Baloo 2'; font-size: 28px; font-weight: 800; color: var(--navy); margin-bottom: 20px; }
.subtitle { font-size: 14px; color: var(--text); margin-bottom: 20px; }
input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 12px; font-size: 14px; }
input:focus { outline: none; border-color: var(--blue); }
.btn { width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; }
.btn-primary { background: linear-gradient(135deg, var(--blue), var(--teal)); color: white; }
.btn-primary:active { opacity: 0.8; }
.error { color: var(--red); font-size: 12px; margin-bottom: 12px; }
.success { color: var(--green); font-size: 12px; margin-bottom: 12px; }
.divider { text-align: center; color: var(--text); margin: 15px 0; font-size: 12px; }
.link { color: var(--blue); cursor: pointer; text-decoration: underline; }
.loading { text-align: center; padding: 20px; }
.spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <!-- Auth Screen -->
  <div id="auth-screen" class="screen active">
    <div class="card">
      <div class="title">Triply</div>
      <div class="subtitle">Plan je reis samen met vrienden</div>
      <div id="auth-message"></div>
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Wachtwoord" autocomplete="password">
      <button class="btn btn-primary" onclick="handleAuth()">Inloggen</button>
      <div class="divider">of</div>
      <button class="btn btn-primary" onclick="toggleSignup()" style="background:var(--border);color:var(--text);">Nieuw account</button>
    </div>
  </div>

  <!-- Trip Selector Screen -->
  <div id="trip-screen" class="screen">
    <div class="card">
      <div class="title">Mijn reizen</div>
      <div id="trips-list"></div>
      <button class="btn btn-primary" onclick="showCreateTrip()">+ Nieuwe reis</button>
      <button class="btn btn-primary" onclick="handleLogout()" style="background:var(--border);color:var(--red);margin-top:10px;">Logout</button>
    </div>
  </div>

  <!-- Create Trip Screen -->
  <div id="create-trip-screen" class="screen">
    <div class="card">
      <div class="title">Nieuwe reis</div>
      <input type="text" id="trip-name" placeholder="Naam (bijv. Vakantie 2026)">
      <input type="text" id="trip-destination" placeholder="Bestemming (bijv. Rhodos)">
      <input type="date" id="trip-start">
      <input type="date" id="trip-end">
      <input type="text" id="trip-hotel" placeholder="Hotel naam">
      <button class="btn btn-primary" onclick="createTrip()">Reis aanmaken</button>
      <button class="btn btn-primary" onclick="showTripSelector()" style="background:var(--border);color:var(--text);margin-top:10px;">Terug</button>
    </div>
  </div>

  <!-- Planner Screen -->
  <div id="planner-screen" class="screen">
    <div style="padding: 20px;">
      <div class="title" id="trip-title" style="margin-bottom:10px;">Trip</div>
      <div id="planner-content"></div>
    </div>
  </div>

</div>

<script>
// Global state
let supabase = null;
let currentUser = null;
let currentTrip = null;
let isSignup = false;

// Initialize Supabase
async function initSupabase() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    if (!cfg.supabaseUrl || !cfg.supabaseKey) throw new Error('Config missing');
    supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
    await checkAuth();
  } catch(e) {
    console.error('Supabase init failed:', e);
    showMessage('Fout bij laden configuratie', 'error');
  }
}

// Check if user is logged in
async function checkAuth() {
  if (!supabase) return;
  const { data: { session } } = await supabase.auth.getSession();
  currentUser = session?.user || null;
  if (currentUser) showTripSelector();
  else showAuthScreen();
}

// Auth
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value.trim();

  if (!email || !password) {
    showMessage('Voer email en wachtwoord in', 'error');
    return;
  }

  const fn = isSignup ? 'signUp' : 'signInWithPassword';
  const { data, error } = await supabase.auth[fn]({ email, password });

  if (error) {
    showMessage(error.message, 'error');
    return;
  }

  currentUser = data.user;
  if (isSignup) {
    await supabase.from('triply_users')
      .upsert([{ id: data.user.id, email }], { onConflict: 'id' });
  }
  showMessage('Welkom! 🎉', 'success');
  setTimeout(() => showTripSelector(), 1000);
}

async function handleLogout() {
  await supabase.auth.signOut();
  currentUser = null;
  currentTrip = null;
  showAuthScreen();
}

// UI Navigation
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showAuthScreen() {
  isSignup = false;
  showScreen('auth-screen');
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
  document.querySelector('[onclick="toggleSignup()"]').textContent = 'Nieuw account';
}

function toggleSignup() {
  isSignup = !isSignup;
  document.querySelector('[onclick="toggleSignup()"]').textContent = isSignup ? 'Inloggen' : 'Nieuw account';
  document.querySelector('.btn-primary').textContent = isSignup ? 'Account aanmaken' : 'Inloggen';
}

function showTripSelector() {
  showScreen('trip-screen');
  loadTrips();
}

function showCreateTrip() {
  showScreen('create-trip-screen');
}

async function createTrip() {
  const name = document.getElementById('trip-name').value.trim();
  const destination = document.getElementById('trip-destination').value.trim();
  const start = document.getElementById('trip-start').value;
  const end = document.getElementById('trip-end').value;
  const hotel = document.getElementById('trip-hotel').value.trim();

  if (!name || !destination || !start || !end) {
    showMessage('Vul alle velden in', 'error');
    return;
  }

  const { data, error } = await supabase
    .from('triply_trips')
    .insert([{
      owner_id: currentUser.id,
      name,
      destination,
      start_date: start,
      end_date: end,
      hotel_name: hotel,
      location_lat: 0,
      location_lng: 0,
      hotel_lat: 0,
      hotel_lng: 0,
    }])
    .select()
    .single();

  if (error) {
    showMessage(error.message, 'error');
    return;
  }

  showMessage('Reis aangemaakt!', 'success');
  setTimeout(() => showTripSelector(), 1000);
}

async function loadTrips() {
  const { data, error } = await supabase
    .from('triply_trips')
    .select('*')
    .eq('owner_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (error) {
    showMessage(error.message, 'error');
    return;
  }

  const html = (data || []).map(t => `
    <div style="padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;" onclick="selectTrip('${t.id}')">
      <div style="font-weight:700;color:var(--navy)">${t.name}</div>
      <div style="font-size:12px;color:var(--text)">${t.destination} • ${t.start_date} tot ${t.end_date}</div>
    </div>
  `).join('');

  document.getElementById('trips-list').innerHTML = html || '<div style="color:var(--text);text-align:center;padding:20px">Geen reizen yet</div>';
}

function selectTrip(tripId) {
  // TODO: laad trip en toon planner
  showMessage('Trip selected: ' + tripId, 'success');
}

function showMessage(msg, type) {
  const el = document.getElementById('auth-message');
  el.innerHTML = `<div class="${type}" style="text-align:center">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 3000);
}

// Init
initSupabase();
</script>
</body>
</html>
